<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>麻雀点数管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #2d8c50;
      --green-dim:  rgba(45, 140, 80, 0.13);
      --green-line: rgba(45, 140, 80, 0.32);
      --gold:       #c8a840;
      --gold-dim:   rgba(200, 168, 64, 0.13);
      --gold-line:  rgba(200, 168, 64, 0.28);
      --bg:         #060e06;
      --card:       #0b170b;
      --card-act:   #111f11;
      --text:       #ece8d8;
      --muted:      #4a5240;
      --border:     rgba(255,255,255,0.05);
      --red:        #c84040;
    }

    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse at 50% -5%, rgba(45,140,80,0.07) 0%, transparent 55%);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', system-ui, sans-serif;
      padding: 20px 16px;
      touch-action: pan-y;
    }

    .app { max-width: 440px; width: 100%; }

    /* ── Header ──────────────────────────────────────────── */
    .app-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 28px;
    }
    .header-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-line));
    }
    .header-line:last-child {
      background: linear-gradient(90deg, var(--gold-line), transparent);
    }
    .app-title {
      font-size: 0.58rem; font-weight: 800;
      letter-spacing: 5px; color: var(--gold);
      text-transform: uppercase; white-space: nowrap;
    }

    /* ── Grid ─────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 8px;
      align-items: center; justify-items: center;
      margin-bottom: 16px;
    }

    /* ── Player card ──────────────────────────────────────── */
    .player-card {
      width: 100%; max-width: 140px;
      background: var(--card);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 14px 8px 14px;
      text-align: center;
      touch-action: none; user-select: none; cursor: grab;
      position: relative; overflow: hidden;
      transition: transform 0.08s, border-color 0.1s, box-shadow 0.1s;
    }
    .player-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      transform: scaleX(0); transform-origin: center;
      transition: transform 0.15s;
    }
    .player-card:active {
      transform: scale(0.93);
      border-color: var(--green-line);
      box-shadow: 0 0 22px rgba(45,140,80,0.18);
      background: var(--card-act);
      cursor: grabbing;
    }
    .player-card:active::before { transform: scaleX(1); }

    .player-name {
      display: block; width: 100%;
      background: none; border: none;
      border-bottom: 1px solid transparent;
      color: var(--muted);
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 1px; text-align: center;
      padding: 2px 4px; margin-bottom: 10px;
      outline: none; cursor: text;
      transition: color 0.15s, border-color 0.15s;
    }
    .player-name:focus { color: var(--text); border-bottom-color: var(--gold); }
    .player-name::placeholder { color: var(--muted); opacity: 0.4; }

    .score {
      font-size: 1.9rem; font-weight: 800;
      font-feature-settings: "tnum";
      color: var(--text); letter-spacing: -1.5px; line-height: 1;
      transition: color 0.2s;
    }
    .score.negative { color: var(--red); }

    .pos-north { grid-column: 2/3; grid-row: 1/2; }
    .pos-west  { grid-column: 1/2; grid-row: 2/3; }
    .pos-east  { grid-column: 3/4; grid-row: 2/3; }
    .pos-south { grid-column: 2/3; grid-row: 3/4; }

    /* Center */
    .center {
      grid-column: 2/3; grid-row: 2/3;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .center-inner {
      width: 48px; height: 48px; border-radius: 50%;
      border: 1px solid var(--gold-line);
      display: flex; align-items: center; justify-content: center;
      background: rgba(200,168,64,0.04);
    }
    .center-kanji { font-size: 1.2rem; font-weight: 800; color: var(--gold); opacity: 0.4; }

    /* ── Action bar ───────────────────────────────────────── */
    .action-bar { display: flex; gap: 7px; margin-bottom: 10px; }
    .btn {
      flex: 1; background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.35);
      font-size: 0.73rem; font-weight: 700;
      padding: 11px 4px; border-radius: 12px;
      cursor: pointer; touch-action: manipulation;
      transition: background 0.1s, color 0.1s, opacity 0.2s;
    }
    .btn:active { background: rgba(255,255,255,0.05); color: var(--text); }
    .btn-reset { border-color: rgba(200,50,50,0.2); color: rgba(200,50,50,0.45); }
    .btn-reset:active { background: rgba(200,50,50,0.07); color: var(--red); }

    .footer-note {
      text-align: center; font-size: 0.6rem;
      color: var(--muted); letter-spacing: 1.5px; opacity: 0.45;
    }

    /* ── Modal ────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 1000; visibility: hidden; opacity: 0;
      transition: opacity 0.22s, visibility 0s 0.22s;
    }
    .modal-overlay.show { visibility: visible; opacity: 1; transition: opacity 0.22s; }

    .modal-sheet {
      width: 100%; max-width: 480px;
      background: #0a160a;
      border-radius: 24px 24px 0 0;
      border-top: 2px solid var(--gold-line);
      padding: 0 18px max(28px, env(safe-area-inset-bottom));
      box-shadow: 0 -20px 60px rgba(0,0,0,0.9);
      transform: translateY(24px);
      transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .modal-overlay.show .modal-sheet { transform: translateY(0); }

    .sheet-handle {
      width: 34px; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px; margin: 12px auto 14px;
    }

    /* Mode toggle (ロン / ツモ) */
    .mode-toggle {
      display: flex; gap: 5px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px; padding: 4px; margin-bottom: 14px;
    }
    .mode-btn {
      flex: 1; background: none; border: none;
      color: var(--muted);
      font-size: 0.82rem; font-weight: 800;
      letter-spacing: 3px; padding: 9px; border-radius: 8px;
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .mode-btn.active { background: var(--green); color: #fff; }

    .modal-label {
      font-size: 0.6rem; font-weight: 800; letter-spacing: 6px;
      color: var(--gold); opacity: 0.75; text-align: center;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .modal-transfer {
      font-size: 1.4rem; font-weight: 800; color: var(--text);
      text-align: center; margin-bottom: 14px; letter-spacing: 1px;
    }

    /* Preset buttons */
    .preset-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .preset-btn {
      flex: 1;
      background: var(--green-dim); border: 1px solid var(--green-line);
      color: #7dc496;
      font-size: 0.68rem; font-weight: 700;
      padding: 8px 2px; border-radius: 8px;
      cursor: pointer; touch-action: manipulation;
      transition: background 0.1s; line-height: 1.45;
    }
    .preset-btn:active { background: rgba(45,140,80,0.26); }
    .preset-btn small { font-size: 0.6rem; opacity: 0.8; }

    /* Ron score display */
    .score-display { text-align: center; margin-bottom: 14px; line-height: 1; }
    .score-big {
      font-size: 3.2rem; font-weight: 800; font-feature-settings: "tnum";
      color: var(--text); letter-spacing: -3px;
    }
    .score-unit { font-size: 1rem; color: var(--muted); margin-left: 2px; }

    /* ── Tsumo section ────────────────────────────────────── */
    .tsumo-type-toggle {
      display: flex; gap: 5px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px; padding: 3px; margin-bottom: 12px;
    }
    .tsumo-type-btn {
      flex: 1; background: none; border: none; color: var(--muted);
      font-size: 0.75rem; font-weight: 700; letter-spacing: 2px;
      padding: 8px 4px; border-radius: 6px; cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .tsumo-type-btn.active { background: var(--gold-dim); color: var(--gold); }

    /* Tsumo input fields */
    .tsumo-inputs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tif {
      flex: 1; background: rgba(255,255,255,0.03);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 10px 8px; text-align: center; cursor: pointer;
      touch-action: manipulation;
      transition: border-color 0.15s, background 0.15s;
    }
    .tif.active { border-color: var(--gold-line); background: var(--gold-dim); }
    .tif-label {
      display: block; font-size: 0.58rem; font-weight: 700;
      letter-spacing: 2px; color: var(--muted); margin-bottom: 5px;
    }
    .tif.active .tif-label { color: var(--gold); }
    .tif-val {
      display: block; font-size: 1.5rem; font-weight: 800;
      font-feature-settings: "tnum"; color: var(--text);
      letter-spacing: -1px; line-height: 1;
    }
    .tif-unit { font-size: 0.7rem; color: var(--muted); }

    /* Numpad */
    .numpad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 6px; margin-bottom: 12px;
    }
    .numpad-btn {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text); font-size: 1.4rem; font-weight: 400;
      padding: 11px 0; border-radius: 12px;
      cursor: pointer; touch-action: manipulation;
      transition: background 0.08s;
      -webkit-tap-highlight-color: transparent;
    }
    .numpad-btn:active { background: rgba(255,255,255,0.1); }
    .numpad-btn.sp { color: var(--gold); font-size: 1rem; font-weight: 700; }

    /* Tsumo breakdown */
    .tsumo-breakdown { display: none; margin-bottom: 12px; }
    .tsumo-breakdown.visible { display: block; }
    .tsumo-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-radius: 10px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      margin-bottom: 5px;
    }
    .tsumo-row.oya-row { border-color: var(--gold-line); background: var(--gold-dim); }
    .tsumo-left { display: flex; align-items: center; gap: 8px; }
    .tsumo-badge {
      font-size: 0.58rem; font-weight: 800; letter-spacing: 1px;
      padding: 3px 7px; border-radius: 5px; cursor: pointer;
    }
    .tsumo-badge.oya { color: var(--gold); background: rgba(200,168,64,0.15); border: 1px solid var(--gold-line); }
    .tsumo-badge.ko  { color: var(--muted); background: rgba(255,255,255,0.04); border: 1px solid var(--border); }
    .tsumo-pname { font-size: 0.84rem; font-weight: 700; color: var(--text); }
    .tsumo-amount { font-size: 1rem; font-weight: 800; color: var(--red); font-feature-settings: "tnum"; }
    .tsumo-hint { font-size: 0.62rem; color: var(--gold); opacity: 0.65; letter-spacing: 0.5px; margin-top: 2px; }
    .tsumo-total { text-align: right; font-size: 0.72rem; color: var(--muted); letter-spacing: 1px; margin-top: 3px; }

    /* Modal actions */
    .modal-actions { display: flex; gap: 8px; }
    .modal-btn {
      flex: 1; border: none; padding: 15px;
      font-size: 0.95rem; font-weight: 800; border-radius: 12px;
      cursor: pointer; touch-action: manipulation; letter-spacing: 1px;
      transition: opacity 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-btn:active { opacity: 0.7; }
    .modal-btn.cancel  { background: rgba(255,255,255,0.06); color: var(--muted); }
    .modal-btn.confirm { background: var(--green); color: #fff; }

    /* ── Toast ────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: max(28px, env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(8px);
      white-space: nowrap;
      background: rgba(6,14,6,0.97); border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px); color: var(--text);
      font-size: 0.82rem; font-weight: 600;
      padding: 10px 22px; border-radius: 40px;
      z-index: 1200; opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s; letter-spacing: 0.3px;
    }
    .toast.show  { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: rgba(200,64,64,0.4); color: #ff7070; }

    @keyframes flash { 0%,100%{opacity:1} 40%{opacity:0.25} }
    .score.flash { animation: flash 0.3s ease; }
  </style>
</head>
<body>

<div class="app">
  <div class="app-header">
    <div class="header-line"></div>
    <div class="app-title">麻雀点数管理</div>
    <div class="header-line"></div>
  </div>

  <div class="grid">
    <div class="player-card pos-north" data-player-id="north">
      <input class="player-name" id="name-north" type="text" value="プレイヤー1" maxlength="8" placeholder="名前">
      <div class="score" id="score-north">25,000</div>
    </div>
    <div class="player-card pos-west" data-player-id="west">
      <input class="player-name" id="name-west" type="text" value="プレイヤー2" maxlength="8" placeholder="名前">
      <div class="score" id="score-west">25,000</div>
    </div>
    <div class="center">
      <div class="center-inner"><span class="center-kanji">中</span></div>
    </div>
    <div class="player-card pos-east" data-player-id="east">
      <input class="player-name" id="name-east" type="text" value="プレイヤー3" maxlength="8" placeholder="名前">
      <div class="score" id="score-east">25,000</div>
    </div>
    <div class="player-card pos-south" data-player-id="south">
      <input class="player-name" id="name-south" type="text" value="プレイヤー4" maxlength="8" placeholder="名前">
      <div class="score" id="score-south">25,000</div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn" id="undoBtn">↩ 取り消し</button>
    <button class="btn" id="redoBtn">↪ やり直し</button>
    <button class="btn btn-reset" id="resetBtn">リセット</button>
  </div>
  <div class="footer-note">スワイプ: ロン ／ ダブルタップ: ツモ</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>

    <div class="mode-toggle">
      <button class="mode-btn active" id="modeRon">ロン</button>
      <button class="mode-btn"        id="modeTsumo">ツモ</button>
    </div>

    <div class="modal-label"    id="modalLabel">点数移動</div>
    <div class="modal-transfer" id="transferInfo"></div>

    <!-- RON section -->
    <div id="ronSection">
      <div class="preset-row">
        <button class="preset-btn" data-preset="1000">1,000</button>
        <button class="preset-btn" data-preset="2000">2,000</button>
        <button class="preset-btn" data-preset="3900">3,900</button>
        <button class="preset-btn" data-preset="8000">8,000</button>
      </div>
      <div class="score-display">
        <span class="score-big" id="scoreDisplay">0</span><span class="score-unit">点</span>
      </div>
      <div class="numpad">
        <button class="numpad-btn" data-rn="1">1</button>
        <button class="numpad-btn" data-rn="2">2</button>
        <button class="numpad-btn" data-rn="3">3</button>
        <button class="numpad-btn" data-rn="4">4</button>
        <button class="numpad-btn" data-rn="5">5</button>
        <button class="numpad-btn" data-rn="6">6</button>
        <button class="numpad-btn" data-rn="7">7</button>
        <button class="numpad-btn" data-rn="8">8</button>
        <button class="numpad-btn" data-rn="9">9</button>
        <button class="numpad-btn sp" data-rn="00">00</button>
        <button class="numpad-btn" data-rn="0">0</button>
        <button class="numpad-btn sp" id="ronBS">⌫</button>
      </div>
    </div>

    <!-- TSUMO section -->
    <div id="tsumoSection" style="display:none">
      <div class="tsumo-type-toggle">
        <button class="tsumo-type-btn active" id="btnKo">子ツモ</button>
        <button class="tsumo-type-btn"        id="btnOya">親ツモ</button>
      </div>

      <!-- 子ツモ presets -->
      <div id="tsumoKoPresets">
        <div class="preset-row">
          <button class="preset-btn tp" data-ko="2000" data-oya="4000">満貫<br><small>2000/4000</small></button>
          <button class="preset-btn tp" data-ko="3000" data-oya="6000">跳満<br><small>3000/6000</small></button>
          <button class="preset-btn tp" data-ko="4000" data-oya="8000">倍満<br><small>4000/8000</small></button>
          <button class="preset-btn tp" data-ko="8000" data-oya="16000">役満<br><small>8000/16000</small></button>
        </div>
      </div>

      <!-- 親ツモ presets -->
      <div id="tsumoOyaPresets" style="display:none">
        <div class="preset-row">
          <button class="preset-btn ta" data-all="4000">満貫<br><small>4000 all</small></button>
          <button class="preset-btn ta" data-all="6000">跳満<br><small>6000 all</small></button>
          <button class="preset-btn ta" data-all="8000">倍満<br><small>8000 all</small></button>
          <button class="preset-btn ta" data-all="16000">役満<br><small>16000 all</small></button>
        </div>
      </div>

      <!-- Input fields -->
      <div class="tsumo-inputs" id="tsumoInputs"></div>

      <!-- Tsumo numpad -->
      <div class="numpad">
        <button class="numpad-btn" data-tn="1">1</button>
        <button class="numpad-btn" data-tn="2">2</button>
        <button class="numpad-btn" data-tn="3">3</button>
        <button class="numpad-btn" data-tn="4">4</button>
        <button class="numpad-btn" data-tn="5">5</button>
        <button class="numpad-btn" data-tn="6">6</button>
        <button class="numpad-btn" data-tn="7">7</button>
        <button class="numpad-btn" data-tn="8">8</button>
        <button class="numpad-btn" data-tn="9">9</button>
        <button class="numpad-btn sp" data-tn="00">00</button>
        <button class="numpad-btn" data-tn="0">0</button>
        <button class="numpad-btn sp" id="tsumoBS">⌫</button>
      </div>

      <div class="tsumo-breakdown" id="tsumoBreakdown"></div>
    </div>

    <div class="modal-actions">
      <button class="modal-btn cancel"  id="cancelBtn">キャンセル</button>
      <button class="modal-btn confirm" id="confirmBtn">決定</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  const IDS = ['north', 'west', 'east', 'south'];

  const players = {
    north: { score: 25000 },
    west:  { score: 25000 },
    east:  { score: 25000 },
    south: { score: 25000 },
  };

  // Direction map: from which card, which swipe direction → target player
  const neighbors = {
    north: { down: 'south', left: 'west',  right: 'east'  },
    west:  { up:   'north', right: 'east', down:  'south' },
    east:  { up:   'north', left:  'west', down:  'south' },
    south: { up:   'north', left:  'west', right: 'east'  },
  };

  /* ── History (undo/redo) ──────────────────────────────── */
  const undoStack = [];
  const redoStack = [];

  function snapshot() {
    return Object.fromEntries(IDS.map(id => [id, players[id].score]));
  }
  function saveState() {
    undoStack.push(snapshot());
    redoStack.length = 0;
    if (undoStack.length > 50) undoStack.shift();
    syncHistoryBtns();
  }
  function applySnapshot(s) {
    for (const id of IDS) players[id].score = s[id];
    renderScores();
  }
  function syncHistoryBtns() {
    undoBtn.style.opacity = undoStack.length ? '1' : '0.3';
    redoBtn.style.opacity = redoStack.length ? '1' : '0.3';
  }

  /* ── Mode / Tsumo state ──────────────────────────────── */
  let mode       = 'ron';   // 'ron' | 'tsumo'
  let tsumoType  = 'ko';    // 'ko' (子) | 'oya' (親)
  let ronSrc     = null;
  let ronTgt     = null;
  let ronInput   = '0';
  let tsumoWinner = null;
  let tsumoDealerId = null; // 子ツモ時の親プレイヤーID
  let tsumoOyaIn = '0';     // 子ツモ: 親が払う点数
  let tsumoKoIn  = '0';     // 子ツモ: 子が払う点数 / 親ツモ: 全員払う点数
  let tsumoFocus = 'oya';   // どちらのフィールドを編集中か: 'oya' | 'ko'

  /* ── Swipe state ────────────────────────────────────── */
  let swipeOrigin = null, swiping = false;
  const SWIPE_MIN = 30;
  let lastTapTime = 0, lastTapPid = null;
  const DTAP_MS   = 320;

  /* ── DOM refs ─────────────────────────────────────────── */
  const scoreEls       = Object.fromEntries(IDS.map(id => [id, document.getElementById('score-' + id)]));
  const nameEls        = Object.fromEntries(IDS.map(id => [id, document.getElementById('name-' + id)]));
  const modal          = document.getElementById('modal');
  const modalLabel     = document.getElementById('modalLabel');
  const transferInfo   = document.getElementById('transferInfo');
  const scoreDisplay   = document.getElementById('scoreDisplay');
  const toast          = document.getElementById('toast');
  const ronSection     = document.getElementById('ronSection');
  const tsumoSection   = document.getElementById('tsumoSection');
  const tsumoBreakdown = document.getElementById('tsumoBreakdown');
  const tsumoInputs    = document.getElementById('tsumoInputs');
  const tsumoKoPresets = document.getElementById('tsumoKoPresets');
  const tsumoOyaPresets= document.getElementById('tsumoOyaPresets');
  const undoBtn        = document.getElementById('undoBtn');
  const redoBtn        = document.getElementById('redoBtn');

  function getName(id) {
    return nameEls[id].value.trim() || `P${IDS.indexOf(id) + 1}`;
  }

  /* ── Score rendering ─────────────────────────────────── */
  function renderScores() {
    for (const id of IDS) {
      const el  = scoreEls[id];
      const val = players[id].score;
      const txt = val.toLocaleString();
      if (el.textContent !== txt) {
        el.textContent = txt;
        el.classList.toggle('negative', val < 0);
        el.classList.remove('flash');
        void el.offsetWidth;
        el.classList.add('flash');
      }
    }
  }

  /* ── Toast ───────────────────────────────────────────── */
  let toastTimer;
  function showToast(msg, err = false) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.toggle('error', err);
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
  }

  /* ── Ron numpad ──────────────────────────────────────── */
  function ronNumIn(n) {
    ronInput = appendNum(ronInput, n);
    scoreDisplay.textContent = fmt(ronInput);
  }
  function ronBS() {
    ronInput = backspace(ronInput);
    scoreDisplay.textContent = fmt(ronInput);
  }
  function setRonPreset(v) {
    ronInput = String(v);
    scoreDisplay.textContent = fmt(ronInput);
  }

  /* ── Tsumo numpad ────────────────────────────────────── */
  function tsumoNumIn(n) {
    if (tsumoType === 'oya') {
      tsumoKoIn = appendNum(tsumoKoIn, n);
    } else {
      if (tsumoFocus === 'oya') {
        tsumoOyaIn = appendNum(tsumoOyaIn, n);
      } else {
        tsumoKoIn = appendNum(tsumoKoIn, n);
      }
    }
    refreshTsumoUI();
  }
  function tsumoBackspace() {
    if (tsumoType === 'oya') {
      tsumoKoIn = backspace(tsumoKoIn);
    } else {
      if (tsumoFocus === 'oya') {
        tsumoOyaIn = backspace(tsumoOyaIn);
      } else {
        tsumoKoIn = backspace(tsumoKoIn);
      }
    }
    refreshTsumoUI();
  }

  /* ── Numpad helpers ──────────────────────────────────── */
  function appendNum(cur, n) {
    if (n === '00') {
      cur = cur === '0' ? '0' : cur + '00';
    } else {
      cur = cur === '0' ? n : cur + n;
    }
    return cur.replace(/^0+(\d)/, '$1').slice(0, 6) || '0';
  }
  function backspace(cur) { return cur.slice(0, -1) || '0'; }
  function fmt(s) { return parseInt(s, 10).toLocaleString(); }

  /* ── Tsumo amounts ───────────────────────────────────── */
  function getTsumoAmounts() {
    if (tsumoType === 'oya') {
      const all = parseInt(tsumoKoIn, 10) || 0;
      return { koAmt: all, oyaAmt: all };
    }
    return {
      koAmt:  parseInt(tsumoKoIn,  10) || 0,
      oyaAmt: parseInt(tsumoOyaIn, 10) || 0,
    };
  }

  /* ── Tsumo input fields ──────────────────────────────── */
  function renderTsumoInputFields() {
    tsumoInputs.innerHTML = '';
    if (tsumoType === 'ko') {
      const fields = [
        { key: 'oya', label: '親から', val: tsumoOyaIn },
        { key: 'ko',  label: '子から', val: tsumoKoIn  },
      ];
      for (const f of fields) {
        const btn = document.createElement('button');
        btn.className = 'tif' + (tsumoFocus === f.key ? ' active' : '');
        btn.innerHTML = `<span class="tif-label">${f.label}</span><span class="tif-val">${fmt(f.val)}</span><span class="tif-unit"> 点</span>`;
        btn.addEventListener('click', () => { tsumoFocus = f.key; renderTsumoInputFields(); });
        tsumoInputs.appendChild(btn);
      }
    } else {
      const btn = document.createElement('button');
      btn.className = 'tif active';
      btn.style.cssText = 'flex:unset;width:100%';
      btn.innerHTML = `<span class="tif-label">子から（各）</span><span class="tif-val">${fmt(tsumoKoIn)}</span><span class="tif-unit"> 点</span>`;
      tsumoInputs.appendChild(btn);
    }
  }

  /* ── Tsumo breakdown ─────────────────────────────────── */
  function renderTsumoBreakdown() {
    if (!tsumoWinner) return;
    const { koAmt, oyaAmt } = getTsumoAmounts();
    const payers = IDS.filter(id => id !== tsumoWinner);

    tsumoBreakdown.innerHTML = '';
    let total = 0;

    for (const id of payers) {
      const isOya = (tsumoType === 'ko') && (id === tsumoDealerId);
      const amt   = isOya ? oyaAmt : koAmt;
      total += amt;

      const row = document.createElement('div');
      row.className = 'tsumo-row' + (isOya ? ' oya-row' : '');

      const badge = document.createElement('span');
      badge.className = 'tsumo-badge ' + (isOya ? 'oya' : 'ko');
      badge.textContent = isOya ? '親' : '子';
      if (tsumoType === 'ko') {
        badge.addEventListener('click', e => {
          e.stopPropagation();
          tsumoDealerId = isOya ? null : id;
          renderTsumoBreakdown();
        });
      }

      const nameEl = document.createElement('span');
      nameEl.className = 'tsumo-pname';
      nameEl.textContent = getName(id);

      const left = document.createElement('div');
      left.className = 'tsumo-left';
      left.appendChild(badge);
      left.appendChild(nameEl);

      const amtEl = document.createElement('span');
      amtEl.className = 'tsumo-amount';
      amtEl.textContent = amt > 0 ? `-${amt.toLocaleString()}` : '—';

      row.appendChild(left);
      row.appendChild(amtEl);
      tsumoBreakdown.appendChild(row);
    }

    if (tsumoType === 'ko' && !tsumoDealerId && (koAmt > 0 || oyaAmt > 0)) {
      const hint = document.createElement('div');
      hint.className = 'tsumo-hint';
      hint.textContent = '「子」バッジをタップして親プレイヤーを指定';
      tsumoBreakdown.appendChild(hint);
    }

    if (total > 0) {
      const tot = document.createElement('div');
      tot.className = 'tsumo-total';
      tot.textContent = `${getName(tsumoWinner)} +${total.toLocaleString()}点`;
      tsumoBreakdown.appendChild(tot);
    }

    tsumoBreakdown.classList.toggle('visible', total > 0 || (koAmt > 0 || oyaAmt > 0));
  }

  function refreshTsumoUI() {
    renderTsumoInputFields();
    renderTsumoBreakdown();
  }

  /* ── Tsumo type toggle ───────────────────────────────── */
  function setTsumoType(type) {
    tsumoType     = type;
    tsumoKoIn     = '0';
    tsumoOyaIn    = '0';
    tsumoDealerId = null;
    tsumoFocus    = 'oya'; // 親から フィールドからスタート

    document.getElementById('btnKo').classList.toggle('active', type === 'ko');
    document.getElementById('btnOya').classList.toggle('active', type === 'oya');
    tsumoKoPresets.style.display  = type === 'ko'  ? '' : 'none';
    tsumoOyaPresets.style.display = type === 'oya' ? '' : 'none';

    renderTsumoInputFields();
    tsumoBreakdown.innerHTML = '';
    tsumoBreakdown.classList.remove('visible');
  }

  /* ── Modal open / close ──────────────────────────────── */
  function setMode(m) {
    mode = m;
    document.getElementById('modeRon').classList.toggle('active', m === 'ron');
    document.getElementById('modeTsumo').classList.toggle('active', m === 'tsumo');
    ronSection.style.display   = m === 'ron'   ? '' : 'none';
    tsumoSection.style.display = m === 'tsumo' ? '' : 'none';

    if (m === 'ron') {
      modalLabel.textContent   = 'ロン';
      transferInfo.textContent = (ronSrc && ronTgt)
        ? `${getName(ronSrc)}　→　${getName(ronTgt)}`
        : '';
    } else {
      modalLabel.textContent   = 'ツモ';
      transferInfo.textContent = tsumoWinner
        ? `${getName(tsumoWinner)}　ツモ和了`
        : '';
    }
  }

  function openRonModal(src, tgt) {
    ronSrc = src; ronTgt = tgt;
    tsumoWinner = src;
    ronInput = '0';
    scoreDisplay.textContent = '0';
    setMode('ron');
    modal.classList.add('show');
  }

  function openTsumoModal(winnerId) {
    tsumoWinner = winnerId;
    ronSrc = null; ronTgt = null;
    setMode('tsumo');
    setTsumoType('ko');
    modal.classList.add('show');
  }

  function closeModal() { modal.classList.remove('show'); }

  /* ── Transfers ───────────────────────────────────────── */
  function doRon() {
    const amt = parseInt(ronInput, 10);
    if (!ronSrc || !ronTgt)  return false;
    if (amt <= 0) { showToast('1点以上入力してください', true); return false; }
    saveState();
    players[ronSrc].score -= amt;
    players[ronTgt].score += amt;
    renderScores();
    showToast(`${getName(ronSrc)} → ${getName(ronTgt)}　${amt.toLocaleString()}点`);
    return true;
  }

  function doTsumo() {
    if (!tsumoWinner) return false;
    const { koAmt, oyaAmt } = getTsumoAmounts();
    const payers = IDS.filter(id => id !== tsumoWinner);
    let total = 0;
    const payments = {};

    for (const id of payers) {
      const isOya = (tsumoType === 'ko') && (id === tsumoDealerId);
      const amt   = isOya ? oyaAmt : koAmt;
      payments[id] = amt;
      total += amt;
    }

    if (total <= 0) { showToast('点数を選択または入力してください', true); return false; }
    saveState();
    for (const [id, amt] of Object.entries(payments)) players[id].score -= amt;
    players[tsumoWinner].score += total;
    renderScores();
    showToast(`${getName(tsumoWinner)} ツモ +${total.toLocaleString()}点`);
    return true;
  }

  /* ── Undo / Redo / Reset ─────────────────────────────── */
  function undo() {
    if (!undoStack.length) { showToast('これ以上戻れません', true); return; }
    redoStack.push(snapshot());
    applySnapshot(undoStack.pop());
    syncHistoryBtns();
    showToast('↩ 取り消し');
  }
  function redo() {
    if (!redoStack.length) { showToast('これ以上進めません', true); return; }
    undoStack.push(snapshot());
    applySnapshot(redoStack.pop());
    syncHistoryBtns();
    showToast('↪ やり直し');
  }
  function resetAll() {
    if (!confirm('全員を 25,000点 にリセットしますか？')) return;
    saveState();
    for (const id of IDS) players[id].score = 25000;
    renderScores();
    showToast('全員 25,000点にリセットしました');
  }

  /* ── Swipe direction ─────────────────────────────────── */
  function getSwipeDir(dx, dy, pid) {
    const ax = Math.abs(dx), ay = Math.abs(dy);
    // Clear axis: dominant must be 1.5× the other
    if (ax > ay * 1.5) return dx > 0 ? 'right' : 'left';
    if (ay > ax * 1.5) return dy > 0 ? 'down'  : 'up';

    // Diagonal zone (30–60°): prefer the direction with a valid neighbor
    const hDir = dx > 0 ? 'right' : 'left';
    const vDir = dy > 0 ? 'down'  : 'up';
    const hasH = !!neighbors[pid]?.[hDir];
    const hasV = !!neighbors[pid]?.[vDir];
    if (hasH && !hasV) return hDir;
    if (hasV && !hasH) return vDir;
    return ax > ay ? hDir : vDir; // both valid: dominant axis wins
  }

  /* ── Swipe events ────────────────────────────────────── */
  function swipeStart(e, pid) {
    swiping = true;
    const p = e.touches ? e.touches[0] : e;
    swipeOrigin = { pid, x: p.clientX, y: p.clientY };
    if (e.cancelable) e.preventDefault();
  }
  function swipeMove(e) { if (swiping && e.cancelable) e.preventDefault(); }
  function swipeEnd(e) {
    if (!swiping || !swipeOrigin) { resetSwipe(); return; }
    const p  = e.changedTouches ? e.changedTouches[0] : e;
    const dx = p.clientX - swipeOrigin.x;
    const dy = p.clientY - swipeOrigin.y;
    const pid = swipeOrigin.pid;

    if (Math.hypot(dx, dy) >= SWIPE_MIN) {
      const dir = getSwipeDir(dx, dy, pid);
      const tgt = neighbors[pid]?.[dir];
      tgt
        ? openRonModal(pid, tgt)
        : showToast('その方向にはプレイヤーがいません', true);
    } else {
      handleTap(pid);
    }
    resetSwipe();
  }
  function resetSwipe() { swiping = false; swipeOrigin = null; }

  /* ── Double tap ──────────────────────────────────────── */
  function handleTap(pid) {
    const now = Date.now();
    if (lastTapPid === pid && now - lastTapTime < DTAP_MS) {
      openTsumoModal(pid);
      lastTapTime = 0; lastTapPid = null;
    } else {
      lastTapTime = now; lastTapPid = pid;
    }
  }

  /* ── Init ────────────────────────────────────────────── */
  function init() {
    renderScores();
    syncHistoryBtns();

    // Card events
    document.querySelectorAll('.player-card').forEach(card => {
      const pid   = card.dataset.playerId;
      const guard = e => e.target.tagName === 'INPUT';

      card.addEventListener('touchstart',  e => { if (!guard(e)) swipeStart(e, pid); }, { passive: false });
      card.addEventListener('touchmove',   e => { if (!guard(e)) swipeMove(e); },       { passive: false });
      card.addEventListener('touchend',    e => { if (!guard(e)) swipeEnd(e); });
      card.addEventListener('touchcancel', e => { if (!guard(e)) resetSwipe(); });
      card.addEventListener('mousedown',   e => {
        if (!guard(e) && e.button === 0) { swipeStart(e, pid); e.preventDefault(); }
      });
    });
    window.addEventListener('mousemove',  e => { if (swiping) { swipeMove(e); e.preventDefault(); } });
    window.addEventListener('mouseup',    e => { if (swipeOrigin) swipeEnd(e); });
    window.addEventListener('mouseleave', ()  => { if (swiping) resetSwipe(); });

    // Mode buttons
    document.getElementById('modeRon').addEventListener('click', () => {
      if (mode !== 'ron') {
        if (ronSrc && ronTgt) setMode('ron');
        else showToast('ロンはカードをスワイプして開始', true);
      }
    });
    document.getElementById('modeTsumo').addEventListener('click', () => {
      if (mode !== 'tsumo') {
        if (!tsumoWinner) tsumoWinner = ronSrc;
        setMode('tsumo');
        setTsumoType('ko');
      }
    });

    // Tsumo type
    document.getElementById('btnKo').addEventListener('click',  () => setTsumoType('ko'));
    document.getElementById('btnOya').addEventListener('click', () => setTsumoType('oya'));

    // Ron numpad
    document.querySelectorAll('.numpad-btn[data-rn]').forEach(btn => {
      btn.addEventListener('click', () => ronNumIn(btn.dataset.rn));
    });
    document.getElementById('ronBS').addEventListener('click', ronBS);
    document.querySelectorAll('.preset-btn[data-preset]').forEach(btn => {
      btn.addEventListener('click', () => setRonPreset(btn.dataset.preset));
    });

    // Tsumo numpad
    document.querySelectorAll('.numpad-btn[data-tn]').forEach(btn => {
      btn.addEventListener('click', () => tsumoNumIn(btn.dataset.tn));
    });
    document.getElementById('tsumoBS').addEventListener('click', tsumoBackspace);

    // Tsumo 子ツモ presets
    document.querySelectorAll('.tp').forEach(btn => {
      btn.addEventListener('click', () => {
        tsumoKoIn  = btn.dataset.ko;
        tsumoOyaIn = btn.dataset.oya;
        refreshTsumoUI();
      });
    });

    // Tsumo 親ツモ presets
    document.querySelectorAll('.ta').forEach(btn => {
      btn.addEventListener('click', () => {
        tsumoKoIn = btn.dataset.all;
        refreshTsumoUI();
      });
    });

    // Confirm / Cancel
    document.getElementById('confirmBtn').addEventListener('click', () => {
      const ok = mode === 'ron' ? doRon() : doTsumo();
      if (ok) closeModal();
    });
    document.getElementById('cancelBtn').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    // History / Reset
    undoBtn.addEventListener('click', undo);
    redoBtn.addEventListener('click', redo);
    document.getElementById('resetBtn').addEventListener('click', resetAll);
  }

  init();
})();
</script>
</body>
</html>
