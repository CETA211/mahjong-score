<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- 背景: 深緑グラデ＋上部ハイライト -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10381e"/>
      <stop offset="0.5" stop-color="#0a2614"/>
      <stop offset="1" stop-color="#06160c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.30" r="0.75">
      <stop offset="0" stop-color="#1c5a32" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1c5a32" stop-opacity="0"/>
    </radialGradient>
    <!-- 牌の象牙フェイス -->
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffefb"/>
      <stop offset="0.5" stop-color="#f6f1e2"/>
      <stop offset="1" stop-color="#e7dcc2"/>
    </linearGradient>
    <!-- 牌側面（厚み） -->
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cdb98e"/>
      <stop offset="1" stop-color="#a98f5e"/>
    </linearGradient>
    <linearGradient id="redChar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d62b30"/>
      <stop offset="1" stop-color="#a8141b"/>
    </linearGradient>
  </defs>

  <!-- 背景（フルブリード・透過なし） -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- 細い金枠（内側） -->
  <rect x="60" y="60" width="904" height="904" rx="150" fill="none" stroke="#c8a840" stroke-opacity="0.45" stroke-width="6"/>

  <!-- 牌の厚み（下面） -->
  <rect x="300" y="232" width="424" height="576" rx="64" fill="url(#side)"/>
  <!-- 牌フェイス -->
  <rect x="300" y="208" width="424" height="568" rx="60" fill="url(#tile)" stroke="#d8c8a0" stroke-width="3"/>
  <!-- フェイス内側の淡い枠 -->
  <rect x="332" y="240" width="360" height="504" rx="40" fill="none" stroke="#e3d6b6" stroke-width="3" opacity="0.8"/>

  <!-- 中 文字（赤） -->
  <text x="512" y="512" text-anchor="middle" dominant-baseline="central"
        font-family="'Yu Mincho','YuMincho','MS Mincho','Hiragino Mincho ProN',serif"
        font-size="420" font-weight="900" fill="url(#redChar)"
        stroke="#7e0d12" stroke-width="4" paint-order="stroke">中</text>
</svg>
