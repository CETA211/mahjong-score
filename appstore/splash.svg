<svg xmlns="http://www.w3.org/2000/svg" width="2732" height="2732" viewBox="0 0 2732 2732">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c2c18"/>
      <stop offset="0.55" stop-color="#08200f"/>
      <stop offset="1" stop-color="#06160c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#1c5a32" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#1c5a32" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffefb"/>
      <stop offset="0.5" stop-color="#f6f1e2"/>
      <stop offset="1" stop-color="#e7dcc2"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cdb98e"/>
      <stop offset="1" stop-color="#a98f5e"/>
    </linearGradient>
    <linearGradient id="redChar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d62b30"/>
      <stop offset="1" stop-color="#a8141b"/>
    </linearGradient>
  </defs>

  <rect width="2732" height="2732" fill="url(#bg)"/>
  <rect width="2732" height="2732" fill="url(#glow)"/>

  <!-- 中央の牌（中央クロップ安全圏内） -->
  <g transform="translate(1366,1230)">
    <rect x="-210" y="-272" width="420" height="572" rx="58" fill="url(#side)"/>
    <rect x="-210" y="-292" width="420" height="566" rx="56" fill="url(#tile)" stroke="#d8c8a0" stroke-width="3"/>
    <rect x="-178" y="-260" width="356" height="502" rx="38" fill="none" stroke="#e3d6b6" stroke-width="3" opacity="0.8"/>
    <text x="0" y="-8" text-anchor="middle" dominant-baseline="central"
          font-family="'Yu Mincho','YuMincho','MS Mincho','Hiragino Mincho ProN',serif"
          font-size="420" font-weight="900" fill="url(#redChar)"
          stroke="#7e0d12" stroke-width="4" paint-order="stroke">中</text>
  </g>

  <!-- タイトル -->
  <text x="1366" y="1720" text-anchor="middle"
        font-family="'Yu Mincho','YuMincho','MS Mincho','Hiragino Mincho ProN',serif"
        font-size="150" font-weight="700" fill="#c8a840" letter-spacing="28">点 棒 い ら ず</text>
</svg>
